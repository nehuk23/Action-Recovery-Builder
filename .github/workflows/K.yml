name: Samsung Kernel Inclusion Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm git libarchive-tools

      - name: Clone Kernel and Toolchain
        run: |
          # Clone your kernel (Update the URL below)
          git clone --depth=1 https://github.com kernel-source
          
          # Clone Proton Clang if not already in your kernel source
          git clone --depth=1 https://github.com proton-clang

      - name: Create Inclusion Config
        run: |
          cat <<EOF > kernel-source/my_inclusion.config
          CONFIG_PRODUCTSHIP=n
          CONFIG_PANIC_ON_OOPS=y
          CONFIG_PANIC_ON_WARN=n
          CONFIG_SEC_REBOOT_RECOVERY=y
          CONFIG_SOFTLOCKUP_DETECTOR=y
          CONFIG_HARDLOCKUP_DETECTOR=y
          CONFIG_LOCKUP_DETECTOR=y
          CONFIG_WATCHDOG=y
          CONFIG_WATCHDOG_CORE=y
          CONFIG_SEC_SBOOT_CHECK=n
          CONFIG_PSTORE=y
          CONFIG_PSTORE_CONSOLE=y
          CONFIG_PSTORE_PMSG=y
          CONFIG_PSTORE_RAM=y
          CONFIG_PSTORE_RAM_ANNOTATION=y
          CONFIG_RAMOOPS=y
          CONFIG_RAMOOPS_DUMP_OOPS=y
          CONFIG_S3C2410_WATCHDOG=y
          CONFIG_S3C2410_WATCHDOG_ATBOOT=y
          CONFIG_S3C2410_WATCHDOG_DEFAULT_TIME=100
          CONFIG_EXYNOS_PMU=y
          CONFIG_RKP_KDP=n
          CONFIG_RKP_NS_PROT=n
          CONFIG_TIMA=n
          CONFIG_SEC_RESTRICT_SETUID=n
          CONFIG_ALWAYS_ENFORCE=n
          CONFIG_SECURITY_SELINUX_DEVELOP=y
          CONFIG_MODULE_SIG_PROTECT=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_EARLY_PRINTK=y
          CONFIG_PANIC_TIMEOUT=15
          CONFIG_SELINUX_DEVELOP=y
          CONFIG_SEC_DEBUG=y
          EOF

      - name: Compile Kernel
        run: |
          cd kernel-source
          
          # Set Proton-Clang Path
          export PATH="${{ github.workspace }}/proton-clang/bin:$PATH"
          
          # 1. Base Config (REPLACE exynos_defconfig with your actual file name)
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- exynos_defconfig
          
          # 2. Force Samsung Security Off (Samsung kernels often ignore .config for these)
          sed -i 's/CONFIG_RKP_KDP=y/CONFIG_RKP_KDP=n/g' .config
          sed -i 's/CONFIG_TIMA=y/CONFIG_TIMA=n/g' .config
          
          # 3. Full Inclusion Merge
          ./scripts/kconfig/merge_config.sh -m .config my_inclusion.config
          
          # 4. Finalize
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

          # 5. Main Build
          make -j$(nproc) ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: kernel-source/arch/arm64/boot/Image*
