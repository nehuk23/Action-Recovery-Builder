name: Samsung M14 GKI Full Inclusion Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc build-essential libssl-dev libelf-dev flex bison clang lld llvm git gcc-aarch64-linux-gnu libarchive-tools

      - name: Download AOSP Clang
        run: |
          mkdir -p clang
          # This downloads a stable AOSP Clang (r416183b)
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master-kernel-build-2021/clang-r416183b.tar.gz" -o clang.tgz
          tar -xzf clang.tgz -C clang

    
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/nehuk23/android_kernel_samsung_s5e8535.git kernel-source

      - name: Create Inclusion Config
        run: |
          cat <<EOF > kernel-source/my_inclusion.config
          CONFIG_PRODUCTSHIP=n
          CONFIG_PANIC_ON_OOPS=y
          CONFIG_PANIC_ON_WARN=n
          CONFIG_SEC_REBOOT_RECOVERY=y
          CONFIG_SOFTLOCKUP_DETECTOR=y
          CONFIG_HARDLOCKUP_DETECTOR=y
          CONFIG_LOCKUP_DETECTOR=y
          CONFIG_WATCHDOG=y
          CONFIG_WATCHDOG_CORE=y
          CONFIG_SEC_SBOOT_CHECK=n
          CONFIG_PSTORE=y
          CONFIG_PSTORE_CONSOLE=y
          CONFIG_PSTORE_PMSG=y
          CONFIG_PSTORE_RAM=y
          CONFIG_PSTORE_RAM_ANNOTATION=y
          CONFIG_RAMOOPS=y
          CONFIG_RAMOOPS_DUMP_OOPS=y
          CONFIG_S3C2410_WATCHDOG=y
          CONFIG_S3C2410_WATCHDOG_ATBOOT=y
          CONFIG_S3C2410_WATCHDOG_DEFAULT_TIME=100
          CONFIG_EXYNOS_PMU=y
          CONFIG_RKP_KDP=n
          CONFIG_RKP_NS_PROT=n
          CONFIG_TIMA=n
          CONFIG_SEC_RESTRICT_SETUID=n
          CONFIG_ALWAYS_ENFORCE=n
          CONFIG_SECURITY_SELINUX_DEVELOP=y
          CONFIG_MODULE_SIG_PROTECT=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_EARLY_PRINTK=y
          CONFIG_PANIC_TIMEOUT=15
          CONFIG_SELINUX_DEVELOP=y
          CONFIG_SEC_DEBUG=y
          EOF

      - name: Compile M14 Kernel
        run: |
          # Set toolchain path to the DOWNLOADED Clang, not the system one
          export PATH="$(pwd)/clang/bin:$PATH"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          cd kernel-source
          
          # 1. Base Config
          make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          
          # 2. Merge Samsung & Custom configs
          ./scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/m14x_defconfig
          ./scripts/kconfig/merge_config.sh -m .config my_inclusion.config
          
          # 3. Finalize
          make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          
          # 4. Build - LLVM=1 ensures llvm-ar is used instead of system ar
          make -j$(nproc) ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: M14-GKI-Kernel
          path: |
            kernel-source/arch/arm64/boot/Image*
            kernel-source/arch/arm64/boot/dts/exynos/*.dtb
