name: Samsung M14 GKI Full Inclusion Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y bc build-essential flex bison libssl-dev libelf-dev clang-14 lld-14 llvm-14 git libarchive-tools

      - name: Clone Kernel Source
        run: |
          # Replace with your actual M14/Exynos 1330 repository link
          git clone --depth=1 https://github.com kernel-source

      - name: Create Inclusion Config
        run: |
          cat <<EOF > kernel-source/my_inclusion.config
          CONFIG_PRODUCTSHIP=n
          CONFIG_PANIC_ON_OOPS=y
          CONFIG_PANIC_ON_WARN=n
          CONFIG_SEC_REBOOT_RECOVERY=y
          CONFIG_SOFTLOCKUP_DETECTOR=y
          CONFIG_HARDLOCKUP_DETECTOR=y
          CONFIG_LOCKUP_DETECTOR=y
          CONFIG_WATCHDOG=y
          CONFIG_WATCHDOG_CORE=y
          CONFIG_SEC_SBOOT_CHECK=n
          CONFIG_PSTORE=y
          CONFIG_PSTORE_CONSOLE=y
          CONFIG_PSTORE_PMSG=y
          CONFIG_PSTORE_RAM=y
          CONFIG_PSTORE_RAM_ANNOTATION=y
          CONFIG_RAMOOPS=y
          CONFIG_RAMOOPS_DUMP_OOPS=y
          CONFIG_S3C2410_WATCHDOG=y
          CONFIG_S3C2410_WATCHDOG_ATBOOT=y
          CONFIG_S3C2410_WATCHDOG_DEFAULT_TIME=100
          CONFIG_EXYNOS_PMU=y
          CONFIG_RKP_KDP=n
          CONFIG_RKP_NS_PROT=n
          CONFIG_TIMA=n
          CONFIG_SEC_RESTRICT_SETUID=n
          CONFIG_ALWAYS_ENFORCE=n
          CONFIG_SECURITY_SELINUX_DEVELOP=y
          CONFIG_MODULE_SIG_PROTECT=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_EARLY_PRINTK=y
          CONFIG_PANIC_TIMEOUT=15
          CONFIG_SELINUX_DEVELOP=y
          CONFIG_SEC_DEBUG=y
          EOF

      - name: Compile M14 Kernel
        run: |
          cd kernel-source
          
          # Use Clang 14 to match your config requirements
          export PATH="/usr/lib/llvm-14/bin:$PATH"
          
          # 1. First, load the base Android GKI config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          
          # 2. Second, merge the Samsung M14 specific hardware config
          # Path: arch/arm64/configs/m14x_defconfig
          ./scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/m14x_defconfig
          
          # 3. Third, merge your custom flags (my_inclusion.config)
          ./scripts/kconfig/merge_config.sh -m .config my_inclusion.config
          
          # 4. Finalize the configuration
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          
          # 5. Build with LLVM Suite (Clang 14 + LLD)
          make -j$(nproc) ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: M14-GKI-Kernel
          path: |
            kernel-source/arch/arm64/boot/Image*
            kernel-source/arch/arm64/boot/dtb.img
