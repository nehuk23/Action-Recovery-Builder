name: Build Android Kernel (Manual Input)

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/nehuk23/android_kernel_samsung_s5e8535.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: 'lineage-23.2'
      config_name:
        description: 'Defconfig Name'
        required: true
        default: 'm14x_defconfig'
      clang_version:
        description: 'AOSP Clang Version (e.g., r450784d)'
        required: true
        default: 'r450784d'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex gcc-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
          libssl-dev python3 zip libelf-dev

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} ${{ github.event.inputs.kernel_url }} kernel-source
      
      - name: Setup AOSP Clang
        run: |
          mkdir -p clang
          cd clang
          # Full direct link to the r450784d toolchain archive from Google Source
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz
          tar -xzf clang-r450784d.tar.gz
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Build Kernel
        working-directory: kernel-source
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$(pwd)/../clang/bin:$PATH
          
          make O=out ${{ github.event.inputs.config_name }}
          make -j$(nproc) O=out \
               CC=clang \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               CLANG_TRIPLE=aarch64-linux-gnu-

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com
          # Checks for common kernel output names
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
          else
            cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/
          fi
          
          cd AnyKernel3
          zip -r9 ../Kernel-Build-$(date +%Y%m%d).zip * -x .git README.md

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Zip-${{ github.event.inputs.kernel_branch }}
          path: "*.zip"
