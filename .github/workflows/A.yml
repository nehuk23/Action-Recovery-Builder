name: OFRP Recovery Build

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/nehuk23/0android_device_samsung_m14x.git'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'android-12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/samsung/m14x'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
        default: 'https://github.com/Teamwin/android_device_samsung_s5e8535-common.git'
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
        default: 'device/samsung/s5e8535-common'
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'm14x'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_m14x'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'
      KERNEL_SOURCE_URL:
        description: 'KERNEL_SOURCE_URL (for building kernel first)'
        required: true
        default: 'https://github.com/nehuk23/android_kernel_samsung_s5e8535'
      KERNEL_SOURCE_BRANCH:
        description: 'KERNEL_SOURCE_BRANCH'
        required: true
        default: 'lineage-23.0'
      KERNEL_DEFCONFIG:
        description: 'KERNEL_DEFCONFIG'
        required: true
        default: 'm14x_defconfig'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
 
    # You might want to Checkout your repo first, but not mandatory
    - name: Check Out
      uses: actions/checkout@v3

    # Cleanup The Actions Workspace Using Custom Composite Run Actions
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize workspace
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    - name: Prepare the build environment
      run: |
        sudo apt install git aria2 -y
        sudo apt install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
        sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
        sudo bash setup/install_android_sdk.sh
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Sync OrangeFox sources and minimal manifest
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git clone ${{ github.event.inputs.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.COMMON_TREE_URL }} -b android-12.1 ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@mas ter
      with:
        swap-size-gb: 12
     

    - name: Clone and Build Kernel with custom config flags
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        
        # Clone kernel source
        git clone ${{ github.event.inputs.KERNEL_SOURCE_URL }} -b ${{ github.event.inputs.KERNEL_SOURCE_BRANCH }} kernel-source
        
        # Create kernel config fragment with all the required flags
        cat << 'KCONFIG' > kernel-config-fragment
        CONFIG_PRODUCTSHIP=n
        CONFIG_PANIC_ON_OOPS=y
        CONFIG_PANIC_ON_WARN=n
        CONFIG_SEC_REBOOT_RECOVERY=y
        CONFIG_SOFTLOCKUP_DETECTOR=y
        CONFIG_HARDLOCKUP_DETECTOR=y
        CONFIG_LOCKUP_DETECTOR=y
        CONFIG_WATCHDOG=y
        CONFIG_WATCHDOG_CORE=y
        CONFIG_SEC_SBOOT_CHECK=n
        CONFIG_PSTORE=y
        CONFIG_PSTORE_CONSOLE=y
        CONFIG_PSTORE_PMSG=y
        CONFIG_PSTORE_RAM=y
        CONFIG_PSTORE_RAM_ANNOTATION=y
        CONFIG_RAMOOPS=y
        CONFIG_RAMOOPS_DUMP_OOPS=y
        CONFIG_S3C2410_WATCHDOG=y
        CONFIG_S3C2410_WATCHDOG_ATBOOT=y
        CONFIG_S3C2410_WATCHDOG_DEFAULT_TIME=100
        CONFIG_EXYNOS_PMU=y
        CONFIG_RKP_KDP=n
        CONFIG_RKP_NS_PROT=n
        CONFIG_TIMA=n
        CONFIG_SEC_RESTRICT_SETUID=n
        CONFIG_ALWAYS_ENFORCE=n
        CONFIG_SECURITY_SELINUX_DEVELOP=y
        CONFIG_MODULE_SIG_PROTECT=y
        CONFIG_IKCONFIG_PROC=y
        CONFIG_EARLY_PRINTK=y
        CONFIG_PANIC_TIMEOUT=15
        CONFIG_SELINUX_DEVELOP=y
        CONFIG_SEC_DEBUG=y
        CONFIG_PSTORE_RAM_MEM_ADDR=0x91200000
        CONFIG_PSTORE_RAM_MEM_SIZE=0x200000
        CONFIG_PSTORE_RAM_CONSOLE_SIZE=0x20000
        CONFIG_PSTORE_RAM_RECORD_SIZE=0x20000
        KCONFIG
        
        # Setup kernel build environment
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        
        # Find clang in Android build environment
        CLANG_PATH=$(find prebuilts -name "clang*" -type d | head -1)
        if [ -n "$CLANG_PATH" ]; then
          export CC=$(find $CLANG_PATH -name "clang" -type f | head -1)
          export CLANG_TRIPLE=aarch64-linux-gnu-
        fi
        
        # Prepare kernel build directory
        mkdir -p out/kernel
        cd kernel-source
        
        # Load base defconfig and merge with fragment
        make O=../out/kernel ARCH=arm64 ${{ github.event.inputs.KERNEL_DEFCONFIG }}
        
        # Merge config fragment
        cat ../kernel-config-fragment >> ../out/kernel/.config
        
        # Update config to include all fragment settings
        make O=../out/kernel ARCH=arm64 olddefconfig
        
        # Build the kernel
        make O=../out/kernel ARCH=arm64 -j$(nproc --all)
        
        # Verify kernel image was built
        ls -la ../out/kernel/arch/arm64/boot/
        
        # Copy kernel image to prebuilt location
        mkdir -p ../prebuilt
        cp ../out/kernel/arch/arm64/boot/Image ../prebuilt/Image
        cp ../out/kernel/arch/arm64/boot/Image.gz ../prebuilt/Image.gz 2>/dev/null || true
        cp ../out/kernel/arch/arm64/boot/Image.gz-dtb ../prebuilt/Image.gz-dtb 2>/dev/null || true
        
        echo "Kernel built successfully at: $(pwd)/../prebuilt/"
        ls -la ../prebuilt/
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Building recovery with prebuilt kernel
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export SOONG_ALLOW_MISSING_DEPENDENCIES=true
        
        # Inject prebuilt kernel path into device tree
        cat << 'EOF' >> ${{ github.event.inputs.DEVICE_PATH }}/device.mk
        
        # Prebuilt kernel configuration for recovery build
        TARGET_PREBUILT_KERNEL := $(LOCAL_PATH)/prebuilt/Image
        BOARD_KERNEL_IMAGE_NAME := Image
        EOF
        
        # Create prebuilt directory in device tree and copy kernel
        mkdir -p ${{ github.event.inputs.DEVICE_PATH }}/prebuilt
        cp ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/prebuilt/Image ${{ github.event.inputs.DEVICE_PATH }}/prebuilt/Image
        
        # Also copy to common tree if it exists
        if [ -d "${{ github.event.inputs.COMMON_PATH }}" ]; then
          mkdir -p ${{ github.event.inputs.COMMON_PATH }}/prebuilt
          cp ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/prebuilt/Image* ${{ github.event.inputs.COMMON_PATH }}/prebuilt/ 2>/dev/null || true
          
          cat << 'EOF' >> ${{ github.event.inputs.COMMON_PATH }}/common.mk
        TARGET_PREBUILT_KERNEL := $(LOCAL_PATH)/prebuilt/Image
        BOARD_KERNEL_IMAGE_NAME := Image
        EOF
        fi
        
        # Alternative: Set environment variable for prebuilt kernel (some builds use this)
        export TARGET_PREBUILT_KERNEL=${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/prebuilt/Image
        
        # Add cmdline for recovery
        cat << 'EOF' >> ${{ github.event.inputs.DEVICE_PATH }}/device.mk
        BOARD_KERNEL_CMDLINE += sec_reboot=recovery
        EOF
        
        # Inject bootconfig for recovery
        
        set -e
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && make clean && mka adbd ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Check the output directory before uploading
      run: |
        ls -al ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/
        echo
        ls -al ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}
          Kernel: Built with custom config flags (debug/development)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
