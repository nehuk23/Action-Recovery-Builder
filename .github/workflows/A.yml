name: OFRP Recovery Build

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/nehuk23/0android_device_samsung_m14x.git'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'android-12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/samsung/m14x'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (leave blank if none)'
        required: false
        default: 'https://github.com/Teamwin/android_device_samsung_s5e8535-common.git'
      COMMON_PATH:
        description: 'COMMON_PATH (leave blank if none)'
        required: false
        default: 'device/samsung/s5e8535-common'
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'm14x'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_m14x'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'
      KERNEL_SOURCE_URL:
        description: 'KERNEL_SOURCE_URL'
        required: true
        default: 'https://github.com/nehuk23/android_kernel_samsung_s5e8535'
      KERNEL_SOURCE_BRANCH:
        description: 'KERNEL_SOURCE_BRANCH'
        required: true
        default: 'lineage-23.0'
      KERNEL_DEFCONFIG:
        description: 'KERNEL_DEFCONFIG'
        required: true
        default: 'm14x_defconfig'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v3

    - name: Cleanup Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize workspace
      id: pwd
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT

    - name: Prepare build environment
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        sudo apt update
        sudo apt install git aria2 gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu -y
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
        sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
        sudo bash setup/install_android_sdk.sh

    - name: Sync OrangeFox sources
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      run: |
        git clone ${{ github.event.inputs.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Clone Trees
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      run: |
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        if [ -n "${{ github.event.inputs.COMMON_TREE_URL }}" ]; then
          git clone ${{ github.event.inputs.COMMON_TREE_URL }} -b android-12.1 ./${{ github.event.inputs.COMMON_PATH }}
        fi

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 30

    - name: Clone and Build Kernel
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      run: |
        git clone https://github.com/kdrag0n/proton-clang --depth=1 scripts/proton-clang
        git clone ${{ github.event.inputs.KERNEL_SOURCE_URL }} -b ${{ github.event.inputs.KERNEL_SOURCE_BRANCH }} kernel-source
        
        cat << 'KCONFIG' > kernel-config-fragment
        CONFIG_SECTION_MISMATCH_WARN_ONLY=y
        CONFIG_PRODUCTSHIP=n
        CONFIG_SEC_REBOOT_RECOVERY=y
        CONFIG_IKCONFIG_PROC=y
        KCONFIG
        
        export ARCH=arm64
        export PATH="${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/scripts/proton-clang/bin:$PATH"
        
        # FIXED: Added HOSTCC/HOSTCXX to avoid libc.so.6 linker errors
        MAKE_ARGS="ARCH=arm64 \
                   CC=clang \
                   HOSTCC=gcc \
                   HOSTCXX=g++ \
                   CROSS_COMPILE=aarch64-linux-gnu- \
                   CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                   LD=ld.lld \
                   AR=llvm-ar \
                   NM=llvm-nm \
                   OBJCOPY=llvm-objcopy \
                   OBJDUMP=llvm-objdump \
                   STRIP=llvm-strip"

        mkdir -p out/kernel
        cd kernel-source
        make O=../out/kernel $MAKE_ARGS ${{ github.event.inputs.KERNEL_DEFCONFIG }} gki_defconfig
        cat ../kernel-config-fragment >> ../out/kernel/.config
        make O=../out/kernel $MAKE_ARGS olddefconfig
        make O=../out/kernel $MAKE_ARGS -j$(nproc --all)
        
        mkdir -p ../prebuilt
        cp ../out/kernel/arch/arm64/boot/Image ../prebuilt/Image
        rm -rf out/kernel kernel-source # Save space

    - name: Building Recovery
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      run: |
        # Inject kernel into device tree
        mkdir -p ${{ github.event.inputs.DEVICE_PATH }}/prebuilt
        cp prebuilt/Image ${{ github.event.inputs.DEVICE_PATH }}/prebuilt/Image
        
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        mka ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-${{ github.event.inputs.DEVICE_NAME }}
        path: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
